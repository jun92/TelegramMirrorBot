# ==========================================
# Custom Aria2 Configuration
# ==========================================

# Maximum number of concurrent downloads
max-concurrent-downloads=3

# Maximum number of connections to one server for each download
max-connection-per-server=10

# Minimum split size
min-split-size=10M

# Split download into N connections
split=10

# File allocation method (keep default or mem for torrents)
follow-torrent=mem

# Overall upload limit (1 byte/sec to minimize upload)
max-overall-upload-limit=1

# Seed time in minutes (0.01 mins = 0.6 seconds to stop seeding quickly)
seed-time=0.01

# RPC Options
rpc-listen-all=true
rpc-max-request-size=1024M
